services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: easyrag-postgres
    environment:
      POSTGRES_USER: easyrag
      POSTGRES_PASSWORD: easyrag
      POSTGRES_DB: easyrag
    ports:
      - "5435:5432"
    volumes:
      - easyrag_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easyrag -d easyrag"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  easyrag_pg_data:
